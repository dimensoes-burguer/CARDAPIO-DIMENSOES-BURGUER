let database; try { firebase.initializeApp(firebaseConfig); database=firebase.database(); } catch(e){ console.error(e); }
const numeroHamburgueria="5562991014682";
const hamburgueriaCoords={lat:-16.650244,lon:-49.153223};
let cardapio={categorias:{}}, opcoesPedido={}, cart=[], lojaAbertaManual=false, taxaFrete=0, clienteLatitude=null, clienteLongitude=null, itemAberto=null, opcaoPendente=null, cupomAplicado=null, anuncios={}, anuncioAtual=null;

function moeda(v){return "R$ "+Number(v||0).toFixed(2).replace(".",",")}
function uid(prefix="id"){return prefix+"_"+Date.now()+"_"+Math.floor(Math.random()*9999)}
function cats(){return Object.values(cardapio.categorias||{}).filter(c=>c.ativo!==false).sort((a,b)=>(a.ordem||999)-(b.ordem||999))}
function itens(cat){return Object.values(cat.itens||{}).filter(i=>i.ativo!==false).sort((a,b)=>(a.ordem||999)-(b.ordem||999))}
function short(t,n=95){t=t||"";return t.length>n?t.slice(0,n)+"...":t}

async function garantirCardapioInicial(){
  const snap=await database.ref("cardapio_web").once("value");
  if(!snap.exists()) await database.ref("cardapio_web").set(cardapioInicial);
}

function iniciar(){
  if(!database) return;
  garantirCardapioInicial();
  database.ref("cardapio_web").on("value",s=>{ cardapio=s.val()||cardapioInicial; renderCardapio(); });
  database.ref("opcoes_pedido").on("value",s=>{ opcoesPedido=s.val()||{}; });
  database.ref("anuncios").on("value",s=>{ anuncios=s.val()||{}; setTimeout(mostrarAnuncioInicial, 700); });
  database.ref("config/loja_aberta").on("value",s=>{ const v=s.val(); lojaAbertaManual=(v===null)?true:!!v; atualizarLoja(); updateCart(); });
}

function atualizarLoja(){
  const st=document.getElementById("status");
  const btn=document.getElementById("checkoutBtn");
  if(!lojaAbertaManual){st.className="status fechado";st.textContent="🔴 Loja fechada temporariamente";btn.textContent="LOJA FECHADA";btn.disabled=true;}
  else{st.className="status";st.textContent="";btn.textContent="Continuar";btn.disabled=cart.length===0;}
}

function renderCardapio(){
  const q=(document.getElementById("search").value||"").toLowerCase().trim();
  const tabs=document.getElementById("tabs"), menu=document.getElementById("menu");
  tabs.innerHTML=""; menu.innerHTML="";
  const categorias=cats();
  categorias.forEach(cat=>{ tabs.innerHTML += `<a href="#${cat.id}">${cat.nome}</a>`; });
  let totalMostrado=0;
  categorias.forEach(cat=>{
    const lista=itens(cat).filter(i=>!q || (i.nome||"").toLowerCase().includes(q) || (i.descricao||"").toLowerCase().includes(q));
    if(!lista.length) return;
    totalMostrado += lista.length;
    const sec=document.createElement("section"); sec.className="category"; sec.id=cat.id;
    sec.innerHTML=`<h2>${cat.nome}</h2>`;
    lista.forEach(item=>{
      const foto=item.foto?`<img class="thumb" src="${item.foto}" onerror="this.outerHTML='<div class=\'no-photo\'>🍔</div>'">`:`<div class="no-photo">🍔</div>`;
      sec.innerHTML += `<div class="item" onclick="openItem('${cat.id}','${item.id}')">
        <div class="item-info"><div class="item-title">${item.nome}</div><div class="item-desc">${short(item.descricao||'Clique para ver detalhes do item.')}</div><div class="item-price">${moeda(item.preco)}</div></div>
        ${foto}<button class="add-mini" onclick="event.stopPropagation();addToCartById('${cat.id}','${item.id}')">+</button>
      </div>`;
    });
    menu.appendChild(sec);
  });
  if(!totalMostrado) menu.innerHTML='<div class="empty">Nenhum item encontrado.</div>';
  atualizarLoja();
  atualizarResumoPedido();
}

function getItem(catId,itemId){const c=(cardapio.categorias||{})[catId]; return c && c.itens ? c.itens[itemId] : null}
function getCategoria(catId){return (cardapio.categorias||{})[catId] || null}
function normalizar(txt){return String(txt||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase()}
function gruposConfigurados(){return Object.values(opcoesPedido||{}).filter(g=>g && g.ativo!==false).sort((a,b)=>Number(a.ordem||999)-Number(b.ordem||999))}
function opcoesAtivasGrupo(g){return Object.values(g.opcoes||{}).filter(o=>o && o.ativo!==false).sort((a,b)=>Number(a.ordem||999)-Number(b.ordem||999))}
function normalizar(txt){return String(txt||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase()}
function tipoOpcoes(catId,item){
  const cat=getCategoria(catId);
  const nome=normalizar(item && item.nome);
  const categoria=normalizar(cat && cat.nome);

function codigoCupom(c){return String(c||"").trim().toUpperCase().replace(/\s/g,"")}
function telefoneLimpo(t){return String(t||"").replace(/\D/g,"")}
function subtotalCarrinho(){return cart.reduce((s,i)=>s+Number(i.preco||0),0)}
function descontoCupom(cupom, subtotal){
  if(!cupom) return 0;
  let valor=Number(cupom.valor||0), d=0;
  if(String(cupom.tipo||'valor')==='percentual') d=subtotal*(valor/100); else d=valor;
  if(d<0)d=0; if(d>subtotal)d=subtotal; return Math.round(d*100)/100;
}
function validarCupomDados(cupom, subtotal){
  if(!cupom) return [false,'Cupom não encontrado.'];
  if(cupom.ativo===false) return [false,'Cupom inativo.'];
  const max=Number(cupom.usos_maximos||0), usados=Number(cupom.usos_usados||0);
  if(max>0 && usados>=max) return [false,'Cupom sem usos disponíveis.'];
  const minimo=Number(cupom.valor_minimo||0);
  if(subtotal<minimo) return [false,`Pedido mínimo: ${moeda(minimo)}.`];
  if(cupom.expira_em){ const exp=new Date(cupom.expira_em); if(!isNaN(exp.getTime()) && new Date()>exp) return [false,'Cupom expirado.']; }
  return [true,'Cupom válido.'];
}
async function aplicarCupom(){
  const codigo=codigoCupom(document.getElementById('cupomInput').value);
  const msg=document.getElementById('cupomMsg');
  if(!codigo){msg.style.color='#dc2626';msg.textContent='Digite um cupom.';return;}
  const subtotal=subtotalCarrinho();
  if(subtotal<=0){msg.style.color='#dc2626';msg.textContent='Adicione itens antes de aplicar cupom.';return;}
  const snap=await database.ref('cupons/'+codigo).once('value');
  const cupom=snap.val(); if(cupom) cupom.codigo=codigo;
  const [ok,erro]=validarCupomDados(cupom, subtotal);
  if(!ok){cupomAplicado=null;msg.style.color='#dc2626';msg.textContent=erro;updateCart();return;}
  cupomAplicado=cupom;
  msg.style.color='#16a34a'; msg.textContent=`Cupom ${codigo} aplicado: -${moeda(descontoCupom(cupom, subtotal))}`;
  updateCart();
}
function limparCupom(){cupomAplicado=null;document.getElementById('cupomInput').value='';const msg=document.getElementById('cupomMsg');msg.textContent='';updateCart();}
async function validarCupomAntesEnvio(subtotal, telefone){
  if(!cupomAplicado) return [true,''];
  const codigo=codigoCupom(cupomAplicado.codigo);
  const tel=telefoneLimpo(telefone);
  try{
    const snap=await database.ref('cupons/'+codigo).once('value');
    const cupom=snap.val();
    if(cupom) cupom.codigo=codigo;
    const [ok,msg]=validarCupomDados(cupom, subtotal);
    if(!ok) return [false,msg];
    if(cupom.um_por_telefone!==false){
      const usoSnap=await database.ref('cupons_usos/'+codigo+'/'+tel).once('value');
      if(usoSnap.exists()) return [false,'Este telefone já usou este cupom.'];
    }
    cupomAplicado=cupom;
    return [true,''];
  }catch(e){
    console.error('Erro ao validar cupom:', e);
    return [false,'Erro ao validar cupom. Verifique a conexão e tente novamente.'];
  }
}

async function registrarUsoCupomWeb(telefone){
  if(!cupomAplicado) return [true,''];
  const codigo=codigoCupom(cupomAplicado.codigo);
  const tel=telefoneLimpo(telefone);
  const usoRef=database.ref('cupons_usos/'+codigo+'/'+tel);
  try{
    let committedOk=false;
    await database.ref('cupons/'+codigo+'/usos_usados').transaction((atual)=>{
      atual=Number(atual||0);
      const max=Number(cupomAplicado.usos_maximos||0);
      if(max>0 && atual>=max) return;
      return atual+1;
    }, (error, committed)=>{ committedOk = (!error && committed); });

    // Fallback: caso a transação não confirme por instabilidade, tenta atualizar de forma simples.
    if(!committedOk){
      const snap=await database.ref('cupons/'+codigo).once('value');
      const cupom=snap.val()||{};
      const usados=Number(cupom.usos_usados||0);
      const max=Number(cupom.usos_maximos||0);
      if(max>0 && usados>=max) return [false,'Cupom sem usos disponíveis.'];
      await database.ref('cupons/'+codigo).update({usos_usados: usados+1});
    }

    if(cupomAplicado.um_por_telefone!==false){
      await usoRef.set({telefone:tel,usado_em:new Date().toISOString(),codigo});
    }
    return [true,''];
  }catch(e){
    console.error('Erro ao registrar cupom:', e);
    return [false,'Pedido enviado, mas não foi possível registrar o uso do cupom. Confira o painel/admin.'];
  }
}
function resumoValores(){
  const subtotal=subtotalCarrinho();
  const desconto=descontoCupom(cupomAplicado, subtotal);
  const total=subtotal+taxaFrete-desconto;
  return {subtotal, desconto, total};
}
function atualizarResumoPedido(){
  const el=document.getElementById('orderSummary');
  if(!el) return;
  const {subtotal, desconto, total}=resumoValores();
  let cupomTxt = cupomAplicado ? `<div class="row"><span>Cupom ${codigoCupom(cupomAplicado.codigo)}</span><b>-${moeda(desconto)}</b></div>` : '';
  el.innerHTML = `<div class="row"><span>Subtotal</span><b>${moeda(subtotal)}</b></div><div class="row"><span>Frete</span><b>${moeda(taxaFrete)}</b></div>${cupomTxt}<div class="row total-row"><span>Total</span><b>${moeda(total)}</b></div>`;
}



// --- ANALYTICS / ESTATÍSTICAS DO CARDÁPIO ---
function analyticsHoje(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dia=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dia}`;
}
function analyticsSessionId(){
  let id=sessionStorage.getItem('db_analytics_session');
  if(!id){id='sess_'+Date.now()+'_'+Math.random().toString(36).slice(2);sessionStorage.setItem('db_analytics_session',id);}
  return id;
}
function analyticsKey(s){return String(s||'sem_id').replace(/[.#$\[\]\/]/g,'_').slice(0,120)}
function analyticsVisitorId(){
  let id=localStorage.getItem('db_analytics_visitor');
  if(!id){id='vis_'+Date.now()+'_'+Math.random().toString(36).slice(2);localStorage.setItem('db_analytics_visitor',id);}
  return id;
}
function analyticsInc(campo, valor=1){
  try{
    if(!database) return;
    database.ref('analytics/daily/'+analyticsHoje()+'/'+campo).transaction(v=>Number(v||0)+valor);
  }catch(e){console.warn('analyticsInc',e);}
}
function analyticsEvent(nome, dados={}){
  try{
    if(!database) return;
    database.ref('analytics/events').push({nome,dados,quando:new Date().toISOString(),dia:analyticsHoje(),sessao:analyticsSessionId(),visitante:analyticsVisitorId()});
  }catch(e){console.warn('analyticsEvent',e);}
}
function analyticsInit(){
  try{
    if(!database) return;
    const sessao=analyticsSessionId();
    const visitante=analyticsVisitorId();
    const onlineRef=database.ref('analytics/online/'+sessao);
    const payload={visitante,sessao,pagina:'cardapio',userAgent:navigator.userAgent||'',inicio:new Date().toISOString(),ultimo_ping:Date.now()};
    onlineRef.set(payload);
    onlineRef.onDisconnect().remove();
    setInterval(()=>onlineRef.update({ultimo_ping:Date.now()}),15000);
    if(!sessionStorage.getItem('db_visita_contada')){
      sessionStorage.setItem('db_visita_contada','1');
      analyticsInc('visitas');
      analyticsEvent('visita_cardapio');
    }
  }catch(e){console.warn('analyticsInit',e);}
}
function analyticsCarrinhoIniciado(){
  if(!sessionStorage.getItem('db_carrinho_iniciado')){
    sessionStorage.setItem('db_carrinho_iniciado','1');
    analyticsInc('carrinhos_iniciados');
    analyticsEvent('carrinho_iniciado');
  }
}
function analyticsCheckoutAberto(){
  if(!sessionStorage.getItem('db_checkout_aberto')){
    sessionStorage.setItem('db_checkout_aberto','1');
    analyticsInc('checkouts_abertos');
  }
  analyticsEvent('checkout_aberto',{itens:cart.length,total:resumoValores().total});

function anunciosAtivos(){return Object.values(anuncios||{}).filter(a=>a && a.ativo!==false && a.imagem).sort((a,b)=>(Number(a.ordem||999)-Number(b.ordem||999)));}
function mostrarAnuncioInicial(){
  const arr=anunciosAtivos();
  if(!arr.length) return;

  // aparece ao entrar no cardápio, mas evita ficar abrindo de novo a cada atualização do Firebase na mesma visita

  if(sessionStorage.getItem(chave)) return;
  anuncioAtual=a;
  const img=document.getElementById('adImage'), title=document.getElementById('adTitle'), sub=document.getElementById('adSub'), action=document.getElementById('adActionText');

function clicarAnuncioAtual(){
  if(!anuncioAtual) return fecharAnuncio();
  const a=anuncioAtual;
  if(a.acao==='nada') return;
  analyticsInc('cliques_anuncios');
  try{
    const rawId=String(a.id||a.titulo||a.imagem||'sem_id');
    const adKey=analyticsKey(rawId);
    database.ref('analytics/anuncios/'+adKey+'/cliques').transaction(v=>Number(v||0)+1);
    database.ref('analytics/anuncios/'+adKey).update({id:a.id||'',titulo:a.titulo||'',ultimo_clique:new Date().toISOString()});
    database.ref('analytics/anuncios/'+adKey+'/por_dia/'+analyticsHoje()).transaction(v=>Number(v||0)+1);
    if(a.id){
      database.ref('analytics/anuncios/'+a.id+'/cliques').transaction(v=>Number(v||0)+1);
      database.ref('analytics/anuncios/'+a.id).update({id:a.id||'',titulo:a.titulo||'',ultimo_clique:new Date().toISOString()});
      database.ref('analytics/anuncios/'+a.id+'/por_dia/'+analyticsHoje()).transaction(v=>Number(v||0)+1);
      database.ref('anuncios/'+a.id+'/cliques').transaction(v=>Number(v||0)+1);
    }
  }catch(e){console.warn('analytics anuncio clique',e);}
  analyticsEvent('anuncio_clicado',{id:a.id||'',titulo:a.titulo||'',acao:a.acao||''});
  fecharAnuncio();
  if(a.acao==='link' && a.url){ window.open(a.url, '_blank'); return; }
  if(a.acao==='item' && a.catId && a.itemId){ addToCartById(a.catId, a.itemId); document.getElementById('cartBox').classList.add('open'); return; }
}

function haversineDistance(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function calculateDelivery(){
  const info=document.getElementById("freteInfo");
  if(!navigator.geolocation){info.textContent="Geolocalização não suportada.";return}
  info.textContent="Buscando localização...";
  navigator.geolocation.getCurrentPosition(pos=>{clienteLatitude=pos.coords.latitude;clienteLongitude=pos.coords.longitude;const d=haversineDistance(hamburgueriaCoords,{lat:clienteLatitude,lon:clienteLongitude});taxaFrete=Math.ceil(d)*2;info.innerHTML=`Distância: <b>${d.toFixed(2)} km</b><br>Frete: <b>${moeda(taxaFrete)}</b>`;updateCart();},()=>{info.textContent="Erro ao obter localização. Verifique o GPS.";})
}

  let subtotal=0,textoItens="",itens=[];
  cart.forEach(i=>{
    subtotal+=Number(i.preco||0);
    const nomeZap=i.detalhes ? `${i.nome} (${i.detalhes})` : i.nome;
    textoItens+=`▪️ ${nomeZap} (${moeda(i.preco)})\n`;
    itens.push({nome:i.nome,preco:Number(i.preco||0),detalhes:i.detalhes||""});
  });

  const btn=document.querySelector('#orderModal .actions .primary');
  const textoOriginal=btn ? btn.textContent : '';
  if(btn){btn.disabled=true; btn.textContent='Enviando...';}

  try{
    // Antes de enviar, valida se o cupom ainda existe, não expirou e ainda possui usos disponíveis.
    if(cupomAplicado){
      const [cupomValido, cupomErro] = await validarCupomAntesEnvio(subtotal, telefone);
      if(!cupomValido){
        alert(cupomErro || 'Cupom inválido.');
        return;
      }
    }

    const desconto=descontoCupom(cupomAplicado, subtotal);
    const total=subtotal+taxaFrete-desconto;
    const cupomPedido = cupomAplicado ? {
      codigo: codigoCupom(cupomAplicado.codigo),
      nome: cupomAplicado.nome || '',
      tipo: cupomAplicado.tipo || 'valor',
      valor: Number(cupomAplicado.valor || 0),
      desconto: desconto
    } : null;

    const tipoPedidoSistema = tipoRecebimento === 'RETIRADA' ? 'RETIRADA WEB' : 'DELIVERY WEB';

    const pedido={
      nome, telefone, endereco, obs, pagamento, troco:troco||'', tipo:tipoPedidoSistema, retirada: tipoRecebimento==='RETIRADA', itens,
      acrescimos:taxaFrete,
      subtotal,
      desconto,
      desconto_cupom: desconto,
      total,
      valor_cobrado: total,
      cupom: cupomPedido,
      cupom_codigo: cupomPedido ? cupomPedido.codigo : '',
      timestamp:Date.now()/1000,
      status:'novo'
    };

    // Primeiro envia o pedido para /pedidos_novos para garantir que chegue ao sistema Python.
    await database.ref('pedidos_novos').push(pedido);
    analyticsInc('pedidos_finalizados');
    analyticsEvent('pedido_finalizado',{tipo:tipoPedidoSistema,total,subtotal,desconto,cupom:cupomPedido?cupomPedido.codigo:''});

    // Depois registra o uso do cupom no mesmo momento da confirmação do pedido.
    if(cupomAplicado){
      analyticsInc('cupons_usados');
      const [usoOk, usoErro] = await registrarUsoCupomWeb(telefone);
      if(!usoOk){
        console.warn(usoErro);
        alert(usoErro || 'Pedido enviado, mas houve falha ao contabilizar o cupom. Confira o painel.');
      }
    }

    let texto=`*-- NOVO PEDIDO | DIMENSÕES BURGUER --* 🍔\n\n*Cliente:* ${nome}\n*Telefone:* ${telefone}\n\n*ITENS:*\n${textoItens}\n*ENDEREÇO:*\n${endereco}\n\n`;
    texto+=`*📍 GPS:*\nhttps://www.google.com/maps?q=${clienteLatitude},${clienteLongitude}\n\n`;
    if(obs) texto+=`*OBS:*\n${obs}\n\n`;
    texto+=`*RESUMO FINANCEIRO:*\nSubtotal: ${moeda(subtotal)}\nFrete: ${moeda(taxaFrete)}\n`;
    if(cupomPedido) texto+=`Cupom: ${cupomPedido.codigo}\nDesconto do cupom: -${moeda(desconto)}\n`;
    texto+=`*Total: ${moeda(total)}*\nPagamento: ${pagamento}`;
    if(pagamento==='Dinheiro'&&troco) texto+=`\nTroco para: R$ ${troco}`;
    window.open(`https://wa.me/${numeroHamburgueria}?text=${encodeURIComponent(texto)}`,'_blank');
    cart=[]; taxaFrete=0; limparCupom(); updateCart(); hideOrderModal();
    alert('Pedido enviado com sucesso!');
  }catch(e){
    console.error('Erro ao enviar pedido:', e);
    alert('Não foi possível enviar o pedido para o sistema. Verifique a internet e tente novamente.');
  }finally{
    if(btn){btn.disabled=false; btn.textContent=textoOriginal || 'Enviar pedido';}
  }
}

toggleTroco(); atualizarTipoRecebimento(); iniciar(); setTimeout(analyticsInit, 900);
</script>
</body>
</html>
